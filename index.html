<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sudoku</title>
	<style>
		:root[data-theme="dark"] {
			--bg: #1c1b1a; --panel: #262422; --ink: #f1ede4; --muted: #948f86;
			--grid-line: #4a463f; --block-line: #cfc8b8;
			--accent: #8B2635; --accent-soft: #2d1a1e; --accent-hover: #a32d40;
			--error: #c4513f; --peer: #2d2b28; --same: #34302a; --shadow: rgba(0,0,0,0.5);
		}
		:root[data-theme="light"] {
			--bg: #f2ede6; --panel: #ffffff; --ink: #1c1b1a; --muted: #7a7470;
			--grid-line: #c8c2ba; --block-line: #4a463f;
			--accent: #8B2635; --accent-soft: #f5dde0; --accent-hover: #a32d40;
			--error: #c4513f; --peer: #f0ece6; --same: #ecddd8; --shadow: rgba(0,0,0,0.15);
		}
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			min-height: 100vh; background: var(--bg); color: var(--ink);
			font-family: 'Georgia','Iowan Old Style',serif;
			display: flex; flex-direction: column; align-items: center;
			padding: 24px 16px 0; transition: background 0.2s, color 0.2s;
		}
		header {
			display: flex; align-items: center; justify-content: space-between;
			width: min(92vw,450px); margin-bottom: 4px;
		}
		h1 { font-weight: 400; font-size: 28px; letter-spacing: 0.04em; }
		.theme-btn {
			background: none; border: 1px solid var(--grid-line); border-radius: 20px;
			padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--muted);
			font-family: 'Helvetica Neue',Arial,sans-serif; transition: border-color 0.2s;
		}
		.theme-btn:hover { border-color: var(--accent); color: var(--ink); }
		.subtitle {
			font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 11px;
			letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
			margin-bottom: 16px; width: min(92vw,450px);
		}
		.toolbar {
			display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
			font-family: 'Helvetica Neue',Arial,sans-serif;
			flex-wrap: wrap; justify-content: center; width: min(92vw,450px);
		}
		select, button {
			font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 13px;
			background: var(--panel); color: var(--ink); border: 1px solid var(--grid-line);
			border-radius: 4px; padding: 8px 12px; cursor: pointer; transition: border-color 0.15s;
		}
		select:hover, button:hover { border-color: var(--accent); }
		button.primary {
			background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;
		}
		button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
		.stats {
			font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 13px;
			color: var(--muted); display: flex; gap: 20px;
			margin-bottom: 12px; width: min(92vw,450px);
		}
		.stats span { color: var(--ink); font-variant-numeric: tabular-nums; }
		#board {
			display: grid; grid-template-columns: repeat(9,1fr); grid-template-rows: repeat(9,1fr);
			width: min(92vw,450px); height: min(92vw,450px);
			background: var(--block-line); border: 2px solid var(--block-line); gap: 1px;
		}
		.cell {
			background: var(--panel); display: flex; align-items: center; justify-content: center;
			font-size: clamp(15px,4vw,22px); color: var(--ink);
			cursor: pointer; user-select: none; position: relative; transition: background 0.1s;
		}
		.cell.given { color: var(--ink); font-weight: 600; }
		.cell.user-val { color: var(--accent); font-weight: 600; }
		.cell.selected { background: var(--accent-soft); }
		.cell.peer { background: var(--peer); }
		.cell.same-value { background: var(--same); }
		.cell.error { color: var(--error) !important; }
		.cell.border-right { border-right: 2px solid var(--block-line); }
		.cell.border-bottom { border-bottom: 2px solid var(--block-line); }
		.notes {
			position: absolute; inset: 0; display: grid;
			grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
			font-size: clamp(7px,1.8vw,9px); color: var(--muted);
			font-family: 'Helvetica Neue',Arial,sans-serif;
		}
		.notes span { display: flex; align-items: center; justify-content: center; }
		#numpad {
			display: grid; grid-template-columns: repeat(9,1fr);
			gap: 5px; width: min(92vw,450px); margin-top: 14px;
		}
		#numpad button { aspect-ratio: 1; font-size: 16px; padding: 0; }
		.actions { display: flex; gap: 8px; margin-top: 12px; font-family: 'Helvetica Neue',Arial,sans-serif; }
		#message {
			margin-top: 14px; font-family: 'Helvetica Neue',Arial,sans-serif;
			font-size: 14px; color: var(--accent); min-height: 20px;
			text-align: center; width: min(92vw,450px);
		}
		.toggle-on { outline: 2px solid var(--accent); }
		#showLeaderboard {
			margin-top: 10px; font-size: 12px; color: var(--muted);
			background: none; border: 1px solid var(--grid-line); padding: 6px 14px;
		}
		.modal-overlay {
			display: none; position: fixed; inset: 0;
			background: rgba(0,0,0,0.65); z-index: 100;
			align-items: center; justify-content: center;
		}
		.modal-overlay.open { display: flex; }
		.modal {
			background: var(--panel); border: 1px solid var(--grid-line);
			border-radius: 8px; padding: 28px 24px; width: min(90vw,380px);
			font-family: 'Helvetica Neue',Arial,sans-serif; box-shadow: 0 8px 32px var(--shadow);
		}
		.modal h2 { font-family: 'Georgia',serif; font-weight: 400; font-size: 22px; margin-bottom: 6px; color: var(--ink); }
		.score-summary { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.8; }
		.score-summary strong { color: var(--accent); font-size: 22px; }
		.modal input[type="text"] {
			width: 100%; padding: 10px 12px; font-size: 15px;
			border: 1px solid var(--grid-line); border-radius: 4px;
			background: var(--bg); color: var(--ink);
			font-family: 'Helvetica Neue',Arial,sans-serif; margin-bottom: 12px; outline: none;
		}
		.modal input[type="text"]:focus { border-color: var(--accent); }
		.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
		.lb-title { font-family: 'Georgia',serif; font-weight: 400; font-size: 20px; margin-bottom: 14px; color: var(--ink); }
		.lb-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
		.lb-filters button { font-size: 11px; padding: 4px 10px; border-radius: 20px; }
		.lb-filters button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
		table { width: 100%; border-collapse: collapse; font-size: 13px; }
		thead th {
			text-align: left; color: var(--muted); font-weight: 400;
			padding: 6px 4px; border-bottom: 1px solid var(--grid-line);
			font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
		}
		tbody td { padding: 8px 4px; border-bottom: 1px solid var(--grid-line); color: var(--ink); }
		tbody tr:first-child td { color: var(--accent); font-weight: 600; }
		.lb-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }
		.close-btn { background: none; border: 1px solid var(--grid-line); font-size: 13px; color: var(--muted); padding: 6px 14px; }
		footer {
			margin-top: auto; padding: 20px 0 14px;
			font-family: 'Helvetica Neue',Arial,sans-serif;
			font-size: 11px; color: var(--muted);
			letter-spacing: 0.05em; text-align: center; width: 100%;
		}
	</style>
</head>
<body>
	
	<header>
		<h1>Sudoku</h1>
		<button class="theme-btn" id="themeToggle">☀ Modo claro</button>
	</header>
	<div class="subtitle">Un juego, sin distracciones</div>
	
	<div class="toolbar">
		<select id="difficulty">
			<option value="36">Fácil</option>
			<option value="30" selected>Medio</option>
			<option value="25">Difícil</option>
			<option value="20">Experto</option>
		</select>
		<button class="primary" id="newGame">Nuevo juego</button>
		<button id="noteToggle">Notas: off</button>
	</div>
	
	<div class="stats">
		<div>Tiempo: <span id="timer">00:00</span></div>
		<div>Errores: <span id="errorCount">0</span></div>
		<div>Puntaje: <span id="scoreDisplay">—</span></div>
	</div>
	
	<div id="board"></div>
	<div id="numpad"></div>
	
	<div class="actions">
		<button id="undoBtn">Deshacer</button>
		<button id="eraseBtn">Borrar</button>
		<button id="hintBtn">Pista</button>
	</div>
	
	<div id="message"></div>
	<button id="showLeaderboard">🏆 Ver puntajes</button>
	
	<!-- Modal: ingresar nombre al ganar -->
	<div class="modal-overlay" id="winModal">
		<div class="modal">
			<h2>¡Puzzle resuelto!</h2>
			<div class="score-summary" id="winSummary"></div>
			<input type="text" id="playerName" placeholder="Tu nombre" maxlength="24" />
			<div class="modal-actions">
				<button class="close-btn" id="skipName">Saltar</button>
				<button class="primary" id="saveName">Guardar puntaje</button>
			</div>
		</div>
	</div>
	
	<!-- Modal: tabla de puntajes -->
	<div class="modal-overlay" id="leaderboardModal">
		<div class="modal">
			<div class="lb-title">🏆 Tabla de puntajes</div>
			<div class="lb-filters" id="lbFilters">
				<button class="active" data-diff="Todos">Todos</button>
				<button data-diff="Fácil">Fácil</button>
				<button data-diff="Medio">Medio</button>
				<button data-diff="Difícil">Difícil</button>
				<button data-diff="Experto">Experto</button>
			</div>
			<div id="lbContent"></div>
			<div class="modal-actions" style="margin-top:14px">
				<button class="close-btn" id="clearScores" style="color:var(--error);border-color:var(--error)">Borrar todo</button>
				<button class="close-btn" id="closeLeaderboard">Cerrar</button>
			</div>
		</div>
	</div>
	
	<footer>Creado por Javier Alvarado</footer>
	
	<script>
		(function(){
		const N=9;
		let solution=[],puzzle=[],board=[],notesData=[],given=[];
		let selected=null,notesMode=false;
		let errorCount=0,timerInterval=null,seconds=0;
		let history=[],gameOver=false,hintCount=0;
		let currentDiffLabel='Medio',lbFilter='Todos';
		
		const DIFF_LABELS={'36':'Fácil','30':'Medio','25':'Difícil','20':'Experto'};
		const DIFF_BASE={'Fácil':1000,'Medio':2000,'Difícil':3000,'Experto':4000};
		
		const boardEl=document.getElementById('board');
		const numpadEl=document.getElementById('numpad');
		const timerEl=document.getElementById('timer');
		const errorEl=document.getElementById('errorCount');
		const scoreEl=document.getElementById('scoreDisplay');
		const messageEl=document.getElementById('message');
		const noteToggleBtn=document.getElementById('noteToggle');
		
		// Theme
		const themeBtn=document.getElementById('themeToggle');
		let theme=localStorage.getItem('sudoku-theme')||'dark';
		applyTheme(theme);
		themeBtn.addEventListener('click',()=>{
			theme=theme==='dark'?'light':'dark';
			applyTheme(theme);
			localStorage.setItem('sudoku-theme',theme);
		});
		function applyTheme(t){
			document.documentElement.setAttribute('data-theme',t);
			themeBtn.textContent=t==='dark'?'☀ Modo claro':'☾ Modo oscuro';
		}
		
		// Generator
		function emptyGrid(){return Array.from({length:N},()=>Array(N).fill(0));}
		function isValid(g,r,c,n){
			for(let i=0;i<N;i++)if(g[r][i]===n||g[i][c]===n)return false;
			const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
			for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)if(g[br+dr][bc+dc]===n)return false;
			return true;
		}
		function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
		function fillGrid(g){
			for(let p=0;p<81;p++){
				const r=Math.floor(p/9),c=p%9;
				if(g[r][c]!==0)continue;
				for(const n of shuffle([1,2,3,4,5,6,7,8,9])){
				if(isValid(g,r,c,n)){g[r][c]=n;if(fillGrid(g))return true;g[r][c]=0;}
				}
				return false;
			}
			return true;
		}
		function countSol(g,limit){
			let count=0;
			function solve(grid){
				if(count>=limit)return;
				for(let p=0;p<81;p++){
				const r=Math.floor(p/9),c=p%9;
				if(grid[r][c]===0){
					for(let n=1;n<=9;n++){
						if(isValid(grid,r,c,n)){grid[r][c]=n;solve(grid);grid[r][c]=0;if(count>=limit)return;}
					}
					return;
				}
				}
				count++;
			}
			solve(g.map(r=>r.slice()));
			return count;
		}
		function makePuzzle(clues){
			const full=emptyGrid();fillGrid(full);
			const p=full.map(r=>r.slice());
			const cells=shuffle(Array.from({length:81},(_,i)=>i));
			let removed=0,toRemove=81-clues;
			for(const pos of cells){
				if(removed>=toRemove)break;
				const r=Math.floor(pos/9),c=pos%9;
				if(p[r][c]===0)continue;
				const bk=p[r][c];p[r][c]=0;
				if(countSol(p,2)!==1)p[r][c]=bk;else removed++;
			}
			return{full,puzzle:p};
		}
		
		// Game
		function newGame(){
			const clues=document.getElementById('difficulty').value;
			currentDiffLabel=DIFF_LABELS[clues];
			messageEl.textContent='Generando tablero…';
			setTimeout(()=>{
				const{full,puzzle:p}=makePuzzle(parseInt(clues,10));
				solution=full;puzzle=p;
				board=p.map(r=>r.slice());
				given=p.map(row=>row.map(v=>v!==0));
				notesData=Array.from({length:9},()=>Array.from({length:9},()=>new Set()));
				errorCount=0;seconds=0;history=[];gameOver=false;selected=null;hintCount=0;
				errorEl.textContent='0';scoreEl.textContent='—';messageEl.textContent='';
				renderBoard();restartTimer();
			},10);
		}
		
		function calcScore(){
			const base=DIFF_BASE[currentDiffLabel]||2000;
			return Math.max(0,base-Math.floor(seconds*0.5)-errorCount*100-hintCount*150);
		}
		
		function restartTimer(){
			if(timerInterval)clearInterval(timerInterval);
			timerEl.textContent='00:00';
			timerInterval=setInterval(()=>{
				seconds++;
				const m=String(Math.floor(seconds/60)).padStart(2,'0');
				const s=String(seconds%60).padStart(2,'0');
				timerEl.textContent=`${m}:${s}`;
				if(!gameOver)scoreEl.textContent=calcScore();
			},1000);
		}
		
		// Render
		function renderBoard(){
			boardEl.innerHTML='';
			for(let r=0;r<9;r++)for(let c=0;c<9;c++){
				const cell=document.createElement('div');
				cell.className='cell';
				cell.dataset.row=r;cell.dataset.col=c;
				if(c===2||c===5)cell.classList.add('border-right');
				if(r===2||r===5)cell.classList.add('border-bottom');
				if(given[r][c])cell.classList.add('given');
				const val=board[r][c];
				if(val!==0){
				cell.textContent=val;
				if(!given[r][c]){cell.classList.add('user-val');if(val!==solution[r][c])cell.classList.add('error');}
				}else if(notesData[r][c].size>0){
				const nd=document.createElement('div');nd.className='notes';
				for(let n=1;n<=9;n++){const sp=document.createElement('span');sp.textContent=notesData[r][c].has(n)?n:'';nd.appendChild(sp);}
				cell.appendChild(nd);
				}
				cell.addEventListener('click',()=>selectCell(r,c));
				boardEl.appendChild(cell);
			}
			updateHighlights();
		}
		
		function updateHighlights(){
			boardEl.querySelectorAll('.cell').forEach(cell=>cell.classList.remove('selected','peer','same-value'));
			if(!selected)return;
			const[sr,sc]=selected,selVal=board[sr][sc];
			boardEl.querySelectorAll('.cell').forEach(cell=>{
				const r=+cell.dataset.row,c=+cell.dataset.col;
				if(r===sr&&c===sc)cell.classList.add('selected');
				else if(r===sr||c===sc||(Math.floor(r/3)===Math.floor(sr/3)&&Math.floor(c/3)===Math.floor(sc/3)))cell.classList.add('peer');
				if(selVal!==0&&board[r][c]===selVal&&!(r===sr&&c===sc))cell.classList.add('same-value');
			});
		}
		
		function selectCell(r,c){if(!gameOver){selected=[r,c];updateHighlights();}}
		
		function setValue(num){
			if(!selected||gameOver)return;
			const[r,c]=selected;if(given[r][c])return;
			history.push({r,c,prevVal:board[r][c],prevNotes:new Set(notesData[r][c])});
			if(notesMode){
				if(board[r][c]!==0)return;
				if(notesData[r][c].has(num))notesData[r][c].delete(num);else notesData[r][c].add(num);
			}else{
				board[r][c]=num;notesData[r][c].clear();
				if(num!==solution[r][c]){errorCount++;errorEl.textContent=errorCount;}
			}
			renderBoard();selected=[r,c];updateHighlights();checkWin();
		}
		
		function eraseCell(){
			if(!selected||gameOver)return;
			const[r,c]=selected;if(given[r][c])return;
			history.push({r,c,prevVal:board[r][c],prevNotes:new Set(notesData[r][c])});
			board[r][c]=0;notesData[r][c].clear();
			renderBoard();selected=[r,c];updateHighlights();
		}
		
		function undo(){
			if(!history.length||gameOver)return;
			const last=history.pop();
			board[last.r][last.c]=last.prevVal;notesData[last.r][last.c]=last.prevNotes;
			renderBoard();selected=[last.r,last.c];updateHighlights();
		}
		
		function giveHint(){
			if(!selected||gameOver)return;
			const[r,c]=selected;if(given[r][c])return;
			history.push({r,c,prevVal:board[r][c],prevNotes:new Set(notesData[r][c])});
			board[r][c]=solution[r][c];notesData[r][c].clear();given[r][c]=true;hintCount++;
			renderBoard();selected=[r,c];updateHighlights();checkWin();
		}
		
		function checkWin(){
			for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]!==solution[r][c])return;
			gameOver=true;clearInterval(timerInterval);
			const fs=calcScore();scoreEl.textContent=fs;
			showWinModal(fs);
		}
		
		// Win Modal
		function showWinModal(score){
			document.getElementById('winSummary').innerHTML=
				`Dificultad: <b>${currentDiffLabel}</b> &nbsp;·&nbsp; Tiempo: <b>${timerEl.textContent}</b> &nbsp;·&nbsp; Errores: <b>${errorCount}</b><br>
				Puntaje: <strong>${score}</strong>`;
			document.getElementById('playerName').value='';
			document.getElementById('winModal').classList.add('open');
			setTimeout(()=>document.getElementById('playerName').focus(),100);
		}
		
		document.getElementById('saveName').addEventListener('click',()=>{
			const name=document.getElementById('playerName').value.trim()||'Anónimo';
			saveScore(name,calcScore());
			document.getElementById('winModal').classList.remove('open');
			messageEl.textContent=`¡Guardado! Puntaje: ${calcScore()}`;
		});
		document.getElementById('skipName').addEventListener('click',()=>{
			document.getElementById('winModal').classList.remove('open');
			messageEl.textContent=`¡Completado! Tiempo: ${timerEl.textContent}`;
		});
		document.getElementById('playerName').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('saveName').click();});
		
		// Scores
		const LS_KEY='sudoku-scores';
		function getScores(){return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}
		function saveScore(name,score){
			const scores=getScores();
			scores.push({name,score,time:timerEl.textContent,errors:errorCount,hints:hintCount,diff:currentDiffLabel,date:new Date().toLocaleDateString('es-CL')});
			scores.sort((a,b)=>b.score-a.score);
			localStorage.setItem(LS_KEY,JSON.stringify(scores.slice(0,100)));
		}
		
		// Leaderboard
		document.getElementById('showLeaderboard').addEventListener('click',()=>{renderLeaderboard();document.getElementById('leaderboardModal').classList.add('open');});
		document.getElementById('closeLeaderboard').addEventListener('click',()=>document.getElementById('leaderboardModal').classList.remove('open'));
		document.getElementById('clearScores').addEventListener('click',()=>{
			if(confirm('¿Borrar todos los puntajes?')){localStorage.removeItem(LS_KEY);renderLeaderboard();}
		});
		document.getElementById('lbFilters').addEventListener('click',e=>{
			if(!e.target.dataset.diff)return;
			lbFilter=e.target.dataset.diff;
			document.querySelectorAll('#lbFilters button').forEach(b=>b.classList.toggle('active',b.dataset.diff===lbFilter));
			renderLeaderboard();
		});
		
		function renderLeaderboard(){
			let scores=getScores();
			if(lbFilter!=='Todos')scores=scores.filter(s=>s.diff===lbFilter);
			const el=document.getElementById('lbContent');
			if(!scores.length){
				el.innerHTML='<div class="lb-empty">Sin puntajes todavía.<br>¡Completa un puzzle!</div>';return;
			}
			el.innerHTML=`<table>
				<thead><tr><th>#</th><th>Nombre</th><th>Puntaje</th><th>Tiempo</th><th>Dif.</th><th>Fecha</th></tr></thead>
				<tbody>${scores.slice(0,15).map((s,i)=>`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.score}</td><td>${s.time}</td><td>${s.diff}</td><td>${s.date}</td></tr>`).join('')}
				</tbody></table>`;
		}
		
		// Numpad
		function renderNumpad(){
			numpadEl.innerHTML='';
			for(let n=1;n<=9;n++){
				const btn=document.createElement('button');btn.textContent=n;
				btn.addEventListener('click',()=>setValue(n));numpadEl.appendChild(btn);
			}
		}
		
		// Keyboard
		document.addEventListener('keydown',e=>{
			if(!selected)return;
			const[r,c]=selected;
			if(e.key>='1'&&e.key<='9')setValue(parseInt(e.key,10));
			else if(e.key==='Backspace'||e.key==='Delete'||e.key==='0')eraseCell();
			else if(e.key==='ArrowUp'&&r>0)selectCell(r-1,c);
			else if(e.key==='ArrowDown'&&r<8)selectCell(r+1,c);
			else if(e.key==='ArrowLeft'&&c>0)selectCell(r,c-1);
			else if(e.key==='ArrowRight'&&c<8)selectCell(r,c+1);
		});
		
		document.getElementById('newGame').addEventListener('click',newGame);
		document.getElementById('undoBtn').addEventListener('click',undo);
		document.getElementById('eraseBtn').addEventListener('click',eraseCell);
		document.getElementById('hintBtn').addEventListener('click',giveHint);
		noteToggleBtn.addEventListener('click',()=>{
			notesMode=!notesMode;
			noteToggleBtn.textContent=`Notas: ${notesMode?'on':'off'}`;
			noteToggleBtn.classList.toggle('toggle-on',notesMode);
		});
		
		renderNumpad();
		newGame();
		})();
	</script>
</body>
</html>
